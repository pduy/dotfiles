[env]
TERM = "xterm-256color"

[font]
size = 15.0

[font.bold]
family = "Inconsolata"
style = "Bold"

[font.bold_italic]
family = "Inconsolata"
style = "Bold Italic"

[font.italic]
family = "Inconsolata"
style = "Italic"

[font.normal]
family = "Inconsolata"
style = "Regular"

[font.offset]
x = 0
y = 1

[scrolling]
history = 10000

[window]
dynamic_padding = false
opacity = 1.0
title = "Alacritty"
decorations = "None"
option_as_alt = "Both"

[window.class]
general = "Alacritty"
instance = "Alacritty"

[window.padding]
x = 6
y = 6

[keyboard]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
